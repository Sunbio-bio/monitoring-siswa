<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SISWA - SDN 62 TAJONG</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #6366f1; --secondary: #a855f7; --bg-dark: #0f172a; --glass: rgba(255, 255, 255, 0.1); --border: rgba(255, 255, 255, 0.2); --accent: #f59e0b; }
        body { margin: 0; min-height: 100vh; font-family: 'Poppins', sans-serif; color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; background: linear-gradient(rgba(15, 23, 42, 0.8), rgba(15, 23, 42, 0.9)), url('sekolah.jpg'); background-size: cover; background-position: center; padding: 20px; }
        
        .box { width: 100%; max-width: 400px; background: var(--glass); backdrop-filter: blur(20px); border-radius: 30px; padding: 30px; border: 1px solid var(--border); text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        
        input { width: 100%; padding: 14px; border-radius: 15px; border: 1px solid var(--border); background: rgba(0,0,0,0.3); color: white; outline: none; font-size: 16px; box-sizing: border-box; }
        
        .btn { width: 100%; padding: 18px; border-radius: 20px; border: none; font-weight: 800; cursor: pointer; text-transform: uppercase; margin-bottom: 15px; transition: 0.3s; }
        .btn-primary { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; margin-top: 10px; }
        .btn-jawab { background: #10b981; color: white; font-size: 18px; box-shadow: 0 10px 20px rgba(16,185,129,0.3); }
        .btn-bantuan { background: #ef4444; color: white; font-size: 16px; box-shadow: 0 10px 20px rgba(239, 68, 68, 0.3); }
        
        #game-ui { display: none; width: 100%; max-width: 400px; }
        .info-msg { background: rgba(0,0,0,0.4); padding: 15px; border-radius: 15px; margin-bottom: 20px; border-left: 4px solid var(--accent); text-align: left; font-size: 14px; }
        
        .footer-login { margin-top: 25px; font-size: 10px; color: #94a3b8; text-align: center; line-height: 1.6; }
    </style>
</head>
<body>

    <div id="login-section" style="width: 100%; display: flex; flex-direction: column; align-items: center;">
        <div class="box">
            <h2 style="color:var(--primary); margin-bottom:0;">SDN 62 TAJONG</h2>
            <p style="font-size:10px; margin-bottom:25px; color:#94a3b8; letter-spacing: 2px;">PORTAL DIGITAL CLASSROOM</p>
            
            <input id="nama" type="text" placeholder="Nama Lengkap Siswa">
            <input id="meja" style="margin-top: 10px;" type="text" placeholder="Nomor Meja (Contoh: 01)">
            <button class="btn btn-primary" onclick="gabung()">MASUK KELAS</button>
        </div>
        
        <div class="footer-login">
            Portal Sekolah Digital © 2026<br>
            Developed by Riski OPS 62 Tajong
        </div>
    </div>

    <div id="game-ui" class="box">
        <div id="user-display" style="font-size: 13px; color: #cbd5e1; margin-bottom: 20px; font-weight: 600; border-bottom: 1px solid var(--border); padding-bottom: 10px;"></div>
        
        <div class="info-msg">
            <b>INFO GURU:</b><br>
            <span id="teks-soal">Menunggu instruksi atau soal dari guru...</span>
        </div>

        <button class="btn btn-jawab" onclick="aksiSiswa('MENJAWAB')">🖐️ SAYA MAU JAWAB</button>
        <button class="btn btn-bantuan" onclick="aksiSiswa('BUTUH BANTUAN')">🚨 BANTUAN GURU</button>

        <div style="margin-top: 10px; display: flex; gap: 8px;">
            <input id="chat-input" placeholder="Balas guru..." style="margin-bottom:0; font-size: 14px;">
            <button onclick="kirimChat()" style="background:var(--primary); border:none; border-radius:12px; padding:0 20px; color:white; font-weight:bold;">Kirim</button>
        </div>
    </div>

    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <script>
        const ably = new Ably.Realtime('Lqd-SA.02uOJw:5Q9fS13uwWhBLZJsqF9XA4gjNMzowZHCq2jJ9kxDdx8');
        const channel = ably.channels.get('kelas-sdn62');

        // FITUR AUTO LOGIN SAAT REFRESH
        window.onload = function() {
            const saveNama = sessionStorage.getItem('nama');
            const saveMeja = sessionStorage.getItem('meja');
            if (saveNama && saveMeja) {
                bukaMenuSiswa(saveNama, saveMeja);
                channel.publish('siswa_join', { nama: saveNama, meja: saveMeja });
            }
        };

        function gabung() {
            const nama = document.getElementById('nama').value;
            const meja = document.getElementById('meja').value;
            if(!nama) return alert("Silakan isi nama Anda!");
            
            sessionStorage.setItem('nama', nama);
            sessionStorage.setItem('meja', meja);
            
            channel.publish('siswa_join', { nama, meja });
            bukaMenuSiswa(nama, meja);
        }

        function bukaMenuSiswa(nama, meja) {
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('game-ui').style.display = 'block';
            document.getElementById('user-display').innerHTML = `👤 ${nama} | Meja ${meja}`;
        }

        channel.subscribe('pesan_guru', (msg) => {
            if(!msg.data.untuk || msg.data.untuk === sessionStorage.getItem('nama')) {
                document.getElementById('teks-soal').innerHTML = msg.data.teks;
                new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3').play();
            }
        });

        function aksiSiswa(tipe) {
            const nama = sessionStorage.getItem('nama');
            const meja = sessionStorage.getItem('meja');
            channel.publish('siswa_aksi', { nama, meja, aksi: tipe });
            alert("Laporan '" + tipe + "' sudah terkirim ke Guru!");
        }

        function kirimChat() {
            const teks = document.getElementById('chat-input').value;
            const nama = sessionStorage.getItem('nama');
            if(!teks) return;
            channel.publish('siswa_aksi', { nama, aksi: 'PESAN', teks });
            document.getElementById('chat-input').value = "";
            alert("Pesan terkirim ke guru!");
        }
    </script>
</body>
</html>

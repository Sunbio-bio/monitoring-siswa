<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SDN 62 TAJONG - Digital Classroom</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #6366f1; --secondary: #a855f7; --bg-dark: #0f172a; --glass: rgba(255, 255, 255, 0.1); --border: rgba(255, 255, 255, 0.2); --accent: #f59e0b; }
        body { margin: 0; min-height: 100vh; font-family: 'Poppins', sans-serif; color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; background: linear-gradient(rgba(15, 23, 42, 0.8), rgba(15, 23, 42, 0.9)), url('sekolah.jpg'); background-size: cover; background-position: center; padding: 15px; }
        .container { width: 100%; max-width: 400px; background: var(--glass); backdrop-filter: blur(20px); border-radius: 30px; padding: 30px; border: 1px solid var(--border); text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        input { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 12px; border: 1px solid var(--border); background: rgba(0,0,0,0.3); color: white; outline: none; }
        .btn { width: 100%; padding: 14px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; margin-top: 5px; }
        .btn-primary { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; }
        .btn-help { background: rgba(239, 68, 68, 0.2); color: #ef4444; border: 1px solid #ef4444; font-size: 12px; margin-top: 15px; }
        #game-ui { display: none; width: 100%; max-width: 400px; }
        .chat-box { background: rgba(0,0,0,0.4); border-radius: 15px; padding: 15px; margin: 15px 0; min-height: 80px; font-size: 14px; border-left: 4px solid var(--accent); text-align: left; }
        .footer { margin-top: 30px; font-size: 10px; color: #94a3b8; line-height: 1.6; }
    </style>
</head>
<body>

    <div id="login-section" class="container">
        <h2>SDN 62 TAJONG</h2>
        <input id="nama" type="text" placeholder="Nama Lengkap">
        <input id="meja" type="text" placeholder="Nomor Meja/Panggilan">
        <button class="btn btn-primary" onclick="gabung()">MASUK KELAS</button>
    </div>

    <div id="game-ui" class="container">
        <div id="user-tag" style="font-size: 12px; margin-bottom: 10px; color: #cbd5e1;"></div>
        <div class="chat-box" id="pesan-guru">MENUNGGU SOAL/PESAN GURU...</div>
        
        <input id="balasan-siswa" type="text" placeholder="Ketik jawaban/balasan ke guru...">
        <button class="btn btn-primary" onclick="kirimBalasan()">KIRIM KE GURU</button>
        
        <button class="btn btn-help" onclick="panggilGuru()">🚨 BUTUH BANTUAN GURU</button>
    </div>

    <div class="footer">
        Portal Sekolah Digital © 2026<br>
        Developed by Riski OPS 62 Tajong
    </div>

    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <script>
        const ably = new Ably.Realtime('Lqd-SA.02uOJw:5Q9fS13uwWhBLZJsqF9XA4gjNMzowZHCq2jJ9kxDdx8');
        const channel = ably.channels.get('kelas-sdn62');

        function gabung() {
            const nama = document.getElementById('nama').value;
            const meja = document.getElementById('meja').value;
            if(!nama) return alert("Isi nama!");
            sessionStorage.setItem('nama', nama);
            sessionStorage.setItem('meja', meja);
            channel.publish('siswa_join', { nama, meja });
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('game-ui').style.display = 'block';
            document.getElementById('user-tag').innerHTML = `👤 ${nama} | Meja ${meja}`;
        }

        channel.subscribe('pesan_dari_guru', (msg) => {
            // Cek apakah pesan untuk semua atau hanya untuk siswa ini
            if (!msg.data.untuk || msg.data.untuk === sessionStorage.getItem('nama')) {
                document.getElementById('pesan-guru').innerHTML = `<b>GURU:</b><br>${msg.data.teks}`;
                new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3').play();
            }
        });

        function kirimBalasan() {
            const teks = document.getElementById('balasan-siswa').value;
            const nama = sessionStorage.getItem('nama');
            if(!teks) return;
            channel.publish('siswa_menjawab', { nama, teks });
            document.getElementById('balasan-siswa').value = "";
            alert("Terkirim ke guru!");
        }

        function panggilGuru() {
            const nama = sessionStorage.getItem('nama');
            channel.publish('siswa_menjawab', { nama: "🚨 " + nama, teks: "MEMBUTUHKAN BANTUAN!" });
            alert("Guru telah dipanggil!");
        }
    </script>
</body>
</html>

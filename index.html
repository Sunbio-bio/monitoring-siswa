<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SISWA - SDN 62 TAJONG</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #6366f1; --bg: #0f172a; }
        body { margin: 0; font-family: 'Poppins', sans-serif; background: var(--bg); color: white; display: flex; align-items: center; justify-content: center; min-height: 100vh; text-align: center; }
        .container { width: 90%; max-width: 400px; background: rgba(255,255,255,0.1); padding: 30px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.2); backdrop-filter: blur(10px); }
        input { width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 15px; border: none; font-size: 16px; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; border-radius: 15px; border: none; font-weight: 800; cursor: pointer; text-transform: uppercase; }
        .btn-login { background: var(--primary); color: white; }
        .btn-jawab { background: #10b981; color: white; font-size: 18px; display: none; margin-top: 20px; box-shadow: 0 10px 20px rgba(16,185,129,0.3); }
        #game-ui { display: none; }
        #soal-box { background: rgba(0,0,0,0.3); padding: 20px; border-radius: 20px; margin-top: 20px; min-height: 100px; display: flex; align-items: center; justify-content: center; font-weight: 600; border: 2px dashed #475569; }
    </style>
</head>
<body>

    <div id="login-section" class="container">
        <h2 style="color:var(--primary); margin-bottom:5px;">SDN 62 TAJONG</h2>
        <p style="font-size: 10px; letter-spacing: 2px; color: #94a3b8; margin-bottom: 25px;">DIGITAL CLASSROOM</p>
        <input id="nama" type="text" placeholder="Nama Lengkap">
        <input id="meja" type="text" placeholder="Nomor Meja">
        <button class="btn btn-login" onclick="gabung()">MASUK KELAS</button>
    </div>

    <div id="game-ui" class="container">
        <div id="status-user" style="font-size: 12px; color: #94a3b8; margin-bottom: 15px;"></div>
        <div id="soal-box">MENUNGGU SOAL DARI GURU...</div>
        <button id="btn-jawab-main" class="btn btn-jawab" onclick="jawab()">🖐️ SAYA MAU JAWAB!</button>
    </div>

    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <script>
        const API_KEY = 'Lqd-SA.02uOJw:5Q9fS13uwWhBLZJsqF9XA4gjNMzowZHCq2jJ9kxDdx8';
        const ably = new Ably.Realtime(API_KEY);
        const channel = ably.channels.get('kelas-sdn62');

        function gabung() {
            const nama = document.getElementById('nama').value;
            const meja = document.getElementById('meja').value;
            if(!nama || !meja) return alert("Lengkapi data!");
            
            sessionStorage.setItem('nama', nama);
            sessionStorage.setItem('meja', meja);
            
            channel.publish('siswa_join', { nama, meja });
            
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('game-ui').style.display = 'block';
            document.getElementById('status-user').innerHTML = `👤 <b>${nama}</b> | Meja ${meja}`;
        }

        // TERIMA SOAL DARI GURU
        channel.subscribe('soal_baru', (msg) => {
            document.getElementById('soal-box').innerHTML = msg.data.teks;
            document.getElementById('soal-box').style.border = "2px solid #6366f1";
            document.getElementById('btn-jawab-main').style.display = 'block';
            document.getElementById('btn-jawab-main').disabled = false;
            document.getElementById('btn-jawab-main').innerText = "🖐️ SAYA MAU JAWAB!";
        });

        function jawab() {
            const nama = sessionStorage.getItem('nama');
            channel.publish('siswa_menjawab', { nama });
            document.getElementById('btn-jawab-main').innerText = "MENUNGGU GURU...";
            document.getElementById('btn-jawab-main').disabled = true;
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SISWA - SDN 62 TAJONG</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #6366f1; --secondary: #a855f7; --bg-dark: #0f172a; --glass: rgba(255, 255, 255, 0.1); --border: rgba(255, 255, 255, 0.2); --accent: #f59e0b; }
        
        /* Perbaikan Body agar konten tidak terpotong di HP */
        body { 
            margin: 0; 
            min-height: 100vh; 
            font-family: 'Poppins', sans-serif; 
            color: #fff; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            background: linear-gradient(rgba(15, 23, 42, 0.8), rgba(15, 23, 42, 0.9)), url('sekolah.jpg'); 
            background-size: cover; 
            background-position: center; 
            padding: 15px; /* Padding lebih kecil untuk HP */
            box-sizing: border-box;
        }

        /* Box dibuat lebih fleksibel lebarnya */
        .box { 
            width: 100%; 
            max-width: 380px; 
            background: var(--glass); 
            backdrop-filter: blur(20px); 
            border-radius: 25px; 
            padding: 25px; 
            border: 1px solid var(--border); 
            text-align: center; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); 
            position: relative;
            box-sizing: border-box;
        }

        /* Tombol dibuat lebih pas untuk jempol di HP */
        .btn { 
            width: 100%; 
            padding: 16px; 
            border-radius: 15px; 
            border: none; 
            font-weight: 800; 
            cursor: pointer; 
            text-transform: uppercase; 
            margin-bottom: 12px; 
            transition: 0.3s; 
            font-size: 14px; /* Ukuran font standar HP */
        }
        
        .btn-primary { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; }
        .btn-jawab { background: #10b981; color: white; font-size: 16px; }
        
        .btn-logout { position: absolute; top: 15px; right: 15px; background: rgba(239, 68, 68, 0.2); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.3); padding: 5px 12px; border-radius: 10px; font-size: 10px; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 5px; }
        .btn-logout:hover { background: #ef4444; color: white; }

        input { 
            width: 100%; 
            padding: 14px; 
            border-radius: 12px; 
            border: 1px solid var(--border); 
            background: rgba(0,0,0,0.3); 
            color: white; 
            outline: none; 
            margin-bottom: 12px; 
            box-sizing: border-box; 
            font-size: 16px; /* Mencegah auto-zoom di iPhone saat ketik */
        }

        #timer { font-size: 28px; font-weight: 800; color: #ef4444; margin: 10px 0; display: none; }
        #input-jawaban-container { display: none; margin-top: 15px; }
        .status-lock { font-size: 12px; color: #ef4444; font-weight: bold; margin-bottom: 10px; display: none; }
        .footer-login { margin-top: 20px; font-size: 10px; color: #94a3b8; text-align: center; }

        /* Media Query khusus HP kecil agar tidak terlalu sesak */
        @media (max-width: 360px) {
            .box { padding: 20px; }
            h2 { font-size: 18px; }
        }
    </style>
</head>
<body>

    <div id="login-section" style="width: 100%; display: flex; justify-content: center;">
        <div class="box">
            <h2 style="color:var(--primary); margin:0;">SDN 62 TAJONG</h2>
            <p style="font-size:10px; margin-bottom:20px;">PORTAL DIGITAL CLASSROOM</p>
            <input id="nama" type="text" placeholder="Nama Lengkap">
            <input id="meja" type="text" placeholder="Nomor Meja">
            <button class="btn btn-primary" onclick="gabung()">MASUK KELAS</button>
        </div>
    </div>
    <div class="footer-login" id="footer-login-text">Portal Sekolah Digital © 2026<br>Developed by Riski OPS 62 Tajong</div>

    <div id="game-ui" class="box" style="display:none;">
        <button class="btn-logout" onclick="keluar()">🚪 LOGOUT</button>
        
        <div id="user-display" style="font-size: 12px; margin-bottom: 15px; opacity: 0.8; text-align: left;"></div>
        
        <div style="background:rgba(0,0,0,0.4); padding:15px; border-radius:15px; margin-bottom:15px; border-left:4px solid var(--accent); text-align: left;">
            <b style="color:var(--accent)">SOAL GURU:</b><br><span id="teks-soal">Menunggu instruksi...</span>
        </div>

        <div id="status-lock" class="status-lock">🔒 TERKUNCI</div>
        <div id="timer">05:00</div>

        <button id="btn-jawab-main" class="btn btn-jawab" onclick="claimJawaban()">🖐️ SAYA MAU JAWAB</button>
        
        <div id="input-jawaban-container">
            <input id="isi-jawaban" placeholder="Ketik jawaban kamu...">
            <button class="btn btn-primary" style="padding: 12px;" onclick="kirimJawaban()">KIRIM JAWABAN</button>
            <button class="btn" style="background:#f59e0b; color:black; font-size:14px;" onclick="alihkanJawaban()">❌ ALIKHAN</button>
        </div>
        
        <button class="btn" style="background:#ef4444; color:white; font-size:12px;" onclick="aksiSiswa('BUTUH BANTUAN')">🚨 BANTUAN GURU</button>
    </div>

    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <script>
        const ably = new Ably.Realtime('Lqd-SA.02uOJw:5Q9fS13uwWhBLZJsqF9XA4gjNMzowZHCq2jJ9kxDdx8');
        const channel = ably.channels.get('sdn62-tajong-main');
        let timerInterval;

        window.onload = function() {
            if(sessionStorage.getItem('nama')) bukaMenuSiswa(sessionStorage.getItem('nama'), sessionStorage.getItem('meja'));
        };

        function gabung() {
            const n = document.getElementById('nama').value, m = document.getElementById('meja').value;
            if(!n) return alert("Isi nama!");
            sessionStorage.setItem('nama', n); sessionStorage.setItem('meja', m);
            channel.publish('siswa_aksi', { nama: n, meja: m, aksi: 'MASUK KELAS' });
            bukaMenuSiswa(n, m);
        }

        function bukaMenuSiswa(n, m) {
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('footer-login-text').style.display = 'none';
            document.getElementById('game-ui').style.display = 'block';
            document.getElementById('user-display').innerText = `👤 ${n} | Meja ${m}`;
        }

// FUNGSI LOGOUT YANG SUDAH DIPERBAIKI
        function keluar() {
            if(confirm("Apakah Anda yakin ingin keluar?")) {
                const n = sessionStorage.getItem('nama');
                if(n) {
                    channel.publish('siswa_aksi', { nama: n, aksi: 'KELUAR KELAS' });
                }
                sessionStorage.clear();
                window.location.reload();
            }
        }}

        channel.subscribe('sistem_kendali', (msg) => {
            const d = msg.data;
            const btn = document.getElementById('btn-jawab-main');
            const status = document.getElementById('status-lock');
            const timerDisplay = document.getElementById('timer');
            const inputCont = document.getElementById('input-jawaban-container');

            if(d.tipe === 'LOCK') {
                btn.style.display = 'none';
                status.style.display = 'block';
                status.innerText = `🔒 TERKUNCI: ${d.oleh}`;
                if(d.oleh === sessionStorage.getItem('nama')) {
                    inputCont.style.display = 'block';
                    timerDisplay.style.display = 'block';
                    startTimer(300);
                }
            } else {
                btn.style.display = 'block';
                status.style.display = 'none';
                inputCont.style.display = 'none';
                timerDisplay.style.display = 'none';
                clearInterval(timerInterval);
            }
        });

        channel.subscribe('pesan_guru', (msg) => {
            if(!msg.data.untuk || msg.data.untuk === 'SEMUA' || msg.data.untuk === sessionStorage.getItem('nama')) {
                document.getElementById('teks-soal').innerHTML = msg.data.teks;
                new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3').play();
            }
        });

        function claimJawaban() { channel.publish('request_lock', { nama: sessionStorage.getItem('nama') }); }
        function alihkanJawaban() { channel.publish('request_unlock', { alasan: 'DIALIHKAN' }); }
        function kirimJawaban() {
            const teks = document.getElementById('isi-jawaban').value;
            if(!teks) return alert("Ketik jawabannya!");
            channel.publish('siswa_aksi', { nama: sessionStorage.getItem('nama'), meja: sessionStorage.getItem('meja'), aksi: 'JAWABAN: ' + teks });
            document.getElementById('isi-jawaban').value = "";
            channel.publish('request_unlock', { alasan: 'SUDAH MENJAWAB' });
        }

        function startTimer(duration) {
            let timer = duration, min, sec;
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                min = parseInt(timer / 60, 10); sec = parseInt(timer % 60, 10);
                document.getElementById('timer').textContent = `${min < 10 ? "0"+min : min}:${sec < 10 ? "0"+sec : sec}`;
                if (--timer < 0) { clearInterval(timerInterval); channel.publish('request_unlock', { alasan: 'WAKTU HABIS' }); }
            }, 1000);
        }

        function aksiSiswa(t) { channel.publish('siswa_aksi', { nama: sessionStorage.getItem('nama'), meja: sessionStorage.getItem('meja'), aksi: t }); }
    </script>
</body>
</html>

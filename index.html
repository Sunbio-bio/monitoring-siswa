<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SDN 62 TAJONG - Digital Classroom</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #6366f1; --accent: #f59e0b; }
        body {
            margin: 0; min-height: 100vh; font-family: 'Poppins', sans-serif; color: #fff;
            display: flex; align-items: center; justify-content: center;
            background: linear-gradient(rgba(15, 23, 42, 0.75), rgba(15, 23, 42, 0.85)), 
                        url('sekolah.jpg'); /* Pastikan file sekolah.jpg ada di Github */
            background-size: cover; background-position: center; background-attachment: fixed;
            padding: 15px; box-sizing: border-box;
        }
        .login-container {
            width: 100%; max-width: 380px; background: rgba(255, 255, 255, 0.1); 
            backdrop-filter: blur(20px); border-radius: 30px; padding: 40px 25px; 
            text-align: center; border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        h2 { font-weight: 800; margin-bottom: 5px; color: var(--primary); }
        input {
            width: 100%; padding: 14px; border: 1px solid rgba(255,255,255,0.2);
            border-radius: 15px; background: rgba(0, 0, 0, 0.3); color: #fff;
            margin-bottom: 12px; font-size: 16px; outline: none; box-sizing: border-box;
        }
        .btn-login {
            width: 100%; padding: 15px; border: none; border-radius: 15px;
            background: linear-gradient(135deg, #6366f1, #a855f7); color: white;
            font-weight: 700; cursor: pointer; text-transform: uppercase;
        }
        #game-ui { display: none; width: 100%; max-width: 450px; text-align: center; }
        .meja-tengah { 
            background: rgba(15, 23, 42, 0.9); padding: 30px; border-radius: 25px; 
            border: 1px solid rgba(255,255,255,0.2); margin-bottom: 20px;
        }
        .btn-jawab {
            background: #10b981; width: 100%; padding: 20px; border-radius: 20px;
            border: none; color: white; font-weight: 800; font-size: 18px;
            box-shadow: 0 10px 25px rgba(16,185,129,0.4); cursor: pointer; display: none;
        }
    </style>
</head>
<body>

    <div id="login-section" class="login-container">
        <h2>SDN 62 TAJONG</h2>
        <div style="font-size: 11px; margin-bottom: 25px; color: #cbd5e1; letter-spacing: 2px;">DIGITAL CLASSROOM</div>
        <input id="nama" type="text" placeholder="Nama Lengkap">
        <input id="meja" type="text" placeholder="Nomor Meja">
        <button class="btn-login" onclick="gabung()">MASUK KELAS</button>
    </div>

    <div id="game-ui">
        <div id="status-info" style="margin-bottom:15px; font-size:12px; color:#cbd5e1;"></div>
        <div class="meja-tengah">
            <div id="soal-display" style="font-size:16px; font-weight:600;">MENUNGGU INSTRUKSI GURU...</div>
        </div>
        <button id="btn-jawab-main" class="btn-jawab" onclick="jawab()">🖐️ SAYA MAU JAWAB!</button>
    </div>

    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <script>
        const API_KEY = 'Lqd-SA.02uOJw:5Q9fS13uwWhBLZJsqF9XA4gjNMzowZHCq2jJ9kxDdx8';
        const ably = new Ably.Realtime(API_KEY);
        const channel = ably.channels.get('kelas-sdn62');

        function gabung() {
            const nama = document.getElementById('nama').value;
            const meja = document.getElementById('meja').value;
            if(!nama || !meja) return alert("Lengkapi data!");
            sessionStorage.setItem('nama', nama);
            channel.publish('siswa_join', { nama, meja });
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('game-ui').style.display = 'block';
            document.getElementById('status-info').innerHTML = `👤 <b>${nama}</b> | Meja ${meja}`;
        }

        channel.subscribe('soal_baru', (msg) => {
            document.getElementById('soal-display').innerHTML = msg.data.teks;
            const btn = document.getElementById('btn-jawab-main');
            btn.style.display = 'block';
            btn.disabled = false;
            btn.innerText = "🖐️ SAYA MAU JAWAB!";
            btn.style.opacity = "1";
        });

        function jawab() {
            const nama = sessionStorage.getItem('nama');
            channel.publish('siswa_menjawab', { nama });
            const btn = document.getElementById('btn-jawab-main');
            btn.innerText = "TERKIRIM!";
            btn.disabled = true;
            btn.style.opacity = "0.6";
        }
    </script>
</body>
</html>

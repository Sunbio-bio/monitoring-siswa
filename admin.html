<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GURU - SDN 62 TAJONG</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #0f172a; color: white; padding: 20px; text-align: center; }
        .box { background: rgba(255,255,255,0.1); padding: 20px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.2); max-width: 500px; margin: auto; }
        input { width: 90%; padding: 15px; border-radius: 10px; border: none; margin-bottom: 10px; font-size: 16px; }
        button { background: #6366f1; color: white; border: none; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer; width: 90%; margin-top: 10px; }
        .log { margin-top: 20px; text-align: left; background: rgba(0,0,0,0.5); padding: 15px; border-radius: 15px; font-size: 13px; height: 300px; overflow-y: auto; border: 1px solid #334155; }
        .item { padding: 10px; border-bottom: 1px solid #1e293b; color: #cbd5e1; }
        .alert { color: #f59e0b; font-weight: bold; background: rgba(245,158,11,0.1); padding: 5px; border-radius: 5px; animation: pop 0.3s ease; }
        @keyframes pop { from {transform: scale(0.8);} to {transform: scale(1);} }
    </style>
</head>
<body>

    <h2>PANEL GURU SDN 62</h2>
    <div class="box">
        <p style="font-size: 12px; color: #94a3b8;">INPUT PERTANYAAN</p>
        <input id="input-soal" type="text" placeholder="Contoh: 5 + 5 = ...">
        <button onclick="kirimSoal()" style="background: #6366f1;">🚀 SEBARKAN SOAL</button>

        <div class="log" id="log-aktivitas">
            <div style="color: #6366f1; font-weight: 800; margin-bottom: 10px; border-bottom: 2px solid #6366f1; padding-bottom: 5px;">NOTIFIKASI KELAS</div>
        </div>
        
        <button onclick="location.reload()" style="background: #475569; font-size: 11px; padding: 8px;">🔄 RESET PANEL</button>
    </div>

    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <script>
        const API_KEY = 'Lqd-SA.02uOJw:5Q9fS13uwWhBLZJsqF9XA4gjNMzowZHCq2jJ9kxDdx8';
        const ably = new Ably.Realtime(API_KEY);
        const channel = ably.channels.get('kelas-sdn62');

        function kirimSoal() {
            const teks = document.getElementById('input-soal').value;
            if(!teks) return alert("Ketik soal dulu!");
            channel.publish('soal_baru', { teks });
            addLog(`✅ Soal dikirim: "${teks}"`);
            document.getElementById('input-soal').value = "";
        }

        channel.subscribe('siswa_join', (msg) => {
            addLog(`👤 <b>${msg.data.nama}</b> masuk dari Meja <b>${msg.data.meja}</b>`);
        });

        channel.subscribe('siswa_menjawab', (msg) => {
            addLog(`<span class="alert">🖐️ ${msg.data.nama.toUpperCase()} MAU JAWAB!</span>`);
            // Bunyi bel
            new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3').play();
        });

        function addLog(html) {
            const div = document.createElement('div');
            div.className = 'item';
            div.innerHTML = html;
            const log = document.getElementById('log-aktivitas');
            log.prepend(div);
        }
    </script>
</body>
</html>

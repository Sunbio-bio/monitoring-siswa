<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADMIN - SDN 62 TAJONG</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #0f172a; color: white; font-family: 'Poppins', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 20px; width: 100%; max-width: 500px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { color: #6366f1; text-align: center; }
        input { width: 100%; padding: 15px; border-radius: 12px; border: none; margin-bottom: 10px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 15px; border-radius: 12px; border: none; background: #6366f1; color: white; font-weight: 800; cursor: pointer; }
        .log-container { margin-top: 20px; width: 100%; max-width: 500px; }
        .log-item { background: rgba(255,255,255,0.05); margin-bottom: 10px; padding: 15px; border-radius: 15px; border-left: 5px solid #6366f1; animation: fadeIn 0.5s ease; }
        .alert-item { border-left-color: #f59e0b; background: rgba(245, 158, 11, 0.1); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <h2>MONITORING GURU</h2>
    <div class="card">
        <input id="input-soal" type="text" placeholder="Masukkan pertanyaan untuk siswa...">
        <button onclick="kirimSoal()">🚀 SEBARKAN SOAL SEKARANG</button>
    </div>

    <div class="log-container" id="log-list">
        </div>

    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <script>
        const API_KEY = 'Lqd-SA.02uOJw:5Q9fS13uwWhBLZJsqF9XA4gjNMzowZHCq2jJ9kxDdx8';
        const ably = new Ably.Realtime(API_KEY);
        const channel = ably.channels.get('kelas-sdn62');

        function kirimSoal() {
            const teks = document.getElementById('input-soal').value;
            if(!teks) return alert("Isi soal dulu Pak!");
            channel.publish('soal_baru', { teks });
            addLog(`✅ Soal dikirim: "${teks}"`, false);
            document.getElementById('input-soal').value = "";
        }

        channel.subscribe('siswa_join', (msg) => {
            addLog(`👤 <b>${msg.data.nama}</b> masuk dari Meja ${msg.data.meja}`, false);
        });

        channel.subscribe('siswa_menjawab', (msg) => {
            addLog(`🖐️ <b>${msg.data.nama}</b> Menekan Tombol Jawab!`, true);
            new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3').play();
        });

        function addLog(html, isAlert) {
            const div = document.createElement('div');
            div.className = 'log-item' + (isAlert ? ' alert-item' : '');
            div.innerHTML = html;
            const list = document.getElementById('log-list');
            list.prepend(div);
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoring Guru - SDN 62 TAJONG</title>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #1a5296; --accent: #4facfe; --danger: #ff4757; --success: #2ed573; }
        * { box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: #f0f4f8; margin: 0; padding: 20px; color: #333; }
        
        .header { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; text-align: center; }
        
        /* PANEL KONTROL GURU (FITUR BARU) */
        .admin-control-panel { 
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px;
        }

        .control-box { 
            background: white; padding: 20px; border-radius: 15px; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.05); border-top: 4px solid var(--primary);
        }

        .input-row { display: flex; gap: 10px; margin-top: 10px; }
        input[type="text"] { 
            flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #ddd; font-size: 14px; outline: none;
        }

        .btn-action { 
            padding: 10px 20px; border-radius: 8px; border: none; font-weight: 700; cursor: pointer; transition: 0.3s;
        }
        .btn-blue { background: var(--primary); color: white; }
        .btn-red { background: var(--danger); color: white; width: 100%; margin-top: 10px; }
        .btn-action:hover { opacity: 0.8; transform: translateY(-2px); }

        /* GRID MONITORING (SKRIP ASLI) */
        #siswa-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-left: 5px solid var(--accent); }
        .card h3 { margin: 0 0 10px; font-size: 15px; color: var(--primary); display: flex; justify-content: space-between; }
        .status-online { color: var(--success); font-weight: bold; }
        .status-offline { color: #ccc; }

        @media (max-width: 768px) {
            .admin-control-panel { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="header">
        <h2 style="margin:0; color:var(--primary);">Panel Monitoring Guru</h2>
        <p style="font-size:12px; color:#666;">SDN 62 TAJONG - Pusat Kendali Realtime</p>
    </div>

    <div class="admin-control-panel">
        <div class="control-box">
            <h3 style="margin:0; font-size:14px;">📢 Kirim Jawaban ke Semua Siswa</h3>
            <div class="input-row">
                <input type="text" id="massAnswerInput" placeholder="Ketik jawaban (Contoh: A, B, C)...">
                <button class="btn-action btn-blue" onclick="kirimJawabanMassal()">KIRIM</button>
            </div>
        </div>

        <div class="control-box">
            <h3 style="margin:0; font-size:14px;">⚠️ Reset Progres Siswa</h3>
            <button class="btn-action btn-red" onclick="resetSemuaSiswa()">🔄 RESET SEMUA SISWA SEKARANG</button>
        </div>
    </div>

    <div id="siswa-container">
        </div>

    <script>
        // --- KONFIGURASI ABLY (TETAP SAMA) ---
        const ably = new Ably.Realtime('Lqd-SA.02uOJw:5Q9fS13uwWhBLZJsqF9XA4gjNMzowZHCq2jJ9kxDdx8');
        const channelMonitoring = ably.channels.get('monitoring-siswa');
        const channelControl = ably.channels.get('kontrol-siswa'); // Jalur perintah
        
        const dataSiswa = {};

        // --- SKRIP ASLI: MONITORING DATA SISWA ---
        channelMonitoring.subscribe('update', (message) => {
            const info = message.data;
            dataSiswa[info.nama] = {
                ...info,
                lastSeen: Date.now()
            };
            renderSiswa();
        });

        // --- FITUR BARU: JAWABAN MASSAL ---
        function kirimJawabanMassal() {
            const jawaban = document.getElementById('massAnswerInput').value;
            if(!jawaban) return alert("Ketik jawaban dulu, Pak!");
            
            channelControl.publish('kirimJawaban', { jawaban: jawaban });
            alert("Jawaban '" + jawaban + "' telah dikirim ke semua siswa.");
            document.getElementById('massAnswerInput').value = "";
        }

        // --- FITUR BARU: RESET SEMUA SISWA (SATU KLIK) ---
        function resetSemuaSiswa() {
            if(confirm("PERINGATAN: Semua siswa yang sedang login akan di-reset soalnya. Lanjutkan?")) {
                channelControl.publish('resetSoal', { target: "SEMUA_SISWA" });
                alert("Perintah Reset Massal telah dikirim!");
            }
        }

        // --- SKRIP ASLI: RENDER TAMPILAN MONITORING ---
        function renderSiswa() {
            const container = document.getElementById('siswa-container');
            container.innerHTML = '';

            Object.keys(dataSiswa).forEach(nama => {
                const s = dataSiswa[nama];
                const isOnline = (Date.now() - s.lastSeen) < 10000;
                
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <h3>${nama} <span class="${isOnline ? 'status-online' : 'status-offline'}">${isOnline ? '●' : '○'}</span></h3>
                    <p style="font-size:13px;"><b>Status:</b> ${s.status || 'Mengerjakan'}</p>
                    <p style="font-size:13px;"><b>Progress:</b> Soal No. ${s.nomorSekarang || '1'}</p>
                    <p style="font-size:13px;"><b>Jawaban:</b> ${s.jawabanTerakhir || '-'}</p>
                `;
                container.appendChild(card);
            });
        }

        // Refresh otomatis status online/offline
        setInterval(renderSiswa, 5000);
    </script>
</body>
</html>

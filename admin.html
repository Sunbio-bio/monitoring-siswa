<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Master Control - SDN 62 TAJONG</title>
    <style>
        :root {
            --primary: #6366f1;
            --bg-dark: #0f172a;
            --glass: rgba(255, 255, 255, 0.07);
            --glass-border: rgba(255, 255, 255, 0.15);
            --font-body: 'Poppins', sans-serif;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
        }

        *, *::before, *::after { box-sizing: border-box; }

        body { 
            font-family: var(--font-body); 
            margin: 0; height: 100vh; display: flex; 
            color: #fff; background-color: var(--bg-dark);
            overflow: hidden;
        }

        /* --- SIDEBAR --- */
        aside { 
            width: 200px; background: rgba(15, 23, 42, 0.98); 
            backdrop-filter: blur(20px); border-right: 1px solid var(--glass-border); 
            display: flex; flex-direction: column; z-index: 1000;
            transition: 0.3s;
        }
        aside.hidden { margin-left: -200px; }
        .brand { padding: 15px; text-align: center; border-bottom: 1px solid var(--glass-border); }
        .nav-link { padding: 10px 15px; font-size: 11px; color: #94a3b8; cursor: pointer; }
        .nav-link.active { background: var(--primary); color: #fff; }

        /* --- MAIN --- */
        main { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }
        
        header { 
            padding: 8px 12px; display: flex; justify-content: space-between; align-items: center; 
            background: rgba(255,255,255,0.03); border-bottom: 1px solid var(--glass-border); 
        }

        .toggle-btn {
            background: var(--primary); color: white; border: none; padding: 6px 12px; 
            border-radius: 6px; cursor: pointer; font-size: 11px;
        }

        /* --- CONTENT AREA --- */
        .content-area { 
            display: flex; flex: 1; padding: 10px; gap: 10px; overflow-y: auto; 
            padding-bottom: 100px;
        }

        @media (max-width: 768px) {
            .content-area { flex-direction: column; }
            .log-section { width: 100% !important; min-height: 250px; }
        }

        .grid-meja { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; flex: 1; }
        .kartu-meja { background: var(--glass); border-radius: 12px; border: 1px solid var(--glass-border); padding-bottom: 5px; }
        .card-title { padding: 5px; text-align: center; font-size: 9px; font-weight: 800; color: #94a3b8; border-bottom: 1px solid var(--glass-border); }

        /* --- LOG SECTION DENGAN TOMBOL HAPUS --- */
        .log-section { width: 300px; background: rgba(15, 23, 42, 0.5); border-radius: 12px; display: flex; flex-direction: column; border: 1px solid var(--glass-border); }
        .log-header { 
            padding: 8px; display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 1px solid var(--glass-border); background: rgba(255,255,255,0.03);
        }
        .btn-hapus {
            background: var(--danger); color: white; border: none; padding: 4px 8px; 
            border-radius: 4px; font-size: 9px; font-weight: bold; cursor: pointer;
        }
        #log-jawaban { flex: 1; overflow-y: auto; padding: 8px; }
        .item-log { background: rgba(255, 255, 255, 0.05); border: 1px solid var(--glass-border); padding: 8px; margin-bottom: 8px; border-radius: 8px; font-size: 10px; }
        .item-panggilan { border-left: 3px solid var(--danger); background: rgba(239, 68, 68, 0.1); }

        /* --- MEJA VISUAL --- */
        .meja-lingkar-mini { width: 70px; height: 70px; background: rgba(0,0,0,0.3); border-radius: 50%; margin: 10px auto; position: relative; border: 1px solid var(--glass-border); }
        .titik-siswa { position: absolute; width: 18px; height: 18px; background: var(--primary); border-radius: 50%; color: #fff; font-size: 7px; display: flex; align-items: center; justify-content: center; }
        .sedang-jawab { background: var(--warning) !important; animation: pulse 1s infinite; }

        /* --- BOTTOM BAR --- */
        .bottom-bar { 
            position: fixed; bottom: 0; left: 0; right: 0;
            background: #1e293b; padding: 10px 10px 25px 10px;
            border-top: 2px solid var(--primary); 
            display: flex; gap: 5px; z-index: 2000;
        }

        .input-group { display: flex; flex: 1; background: rgba(255,255,255,0.07); border-radius: 20px; border: 1px solid var(--glass-border); }
        .input-broadcast { background: transparent; border: none; color: #fff; padding: 8px 12px; flex: 1; outline: none; font-size: 12px; }
        .btn { padding: 8px 12px; border-radius: 15px; border: none; font-weight: 700; cursor: pointer; color: #fff; font-size: 10px; }
        .btn-main { background: var(--primary); }
        .btn-success { background: var(--success); }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <aside id="sidebar">
        <div class="brand"><b style="font-size:12px;">SDN 62 TAJONG</b></div>
        <div class="nav-link active">📊 Monitoring</div>
        <div class="nav-link" onclick="location.reload()">🔄 Refresh Halaman</div>
    </aside>

    <main>
        <header>
            <button class="toggle-btn" onclick="toggleMenu()">☰ MENU</button>
            <div id="clock" style="font-size: 11px; color: var(--primary);">00:00:00</div>
        </header>

        <div class="content-area">
            <div id="container-meja" class="grid-meja"></div>
            
            <div class="log-section">
                <div class="log-header">
                    <span style="font-size: 9px; font-weight: bold; color: #94a3b8;">LOG AKTIVITAS</span>
                    <button class="btn-hapus" onclick="hapusLog()">🗑️ HAPUS LOG</button>
                </div>
                <div id="log-jawaban"></div>
            </div>
        </div>

        <div class="bottom-bar">
            <button class="btn btn-success" onclick="kirimSoalOtomatis()">🚀 ACAK</button>
            <div class="input-group">
                <input id="soalManual" class="input-broadcast" placeholder="Ketik soal/pesan ke semua...">
                <button class="btn btn-main" onclick="kirimSoalManual()">KIRIM</button>
            </div>
        </div>
    </main>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        socket.emit('join_admin');

        function toggleMenu() { document.getElementById('sidebar').classList.toggle('hidden'); }
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('id-ID'); }, 1000);

        // Fungsi Baru untuk Hapus Log di Layar
        function hapusLog() {
            if(confirm("Bersihkan semua riwayat pesan di layar?")) {
                document.getElementById('log-jawaban').innerHTML = "";
            }
        }

        function kirimSoalOtomatis() { socket.emit('admin_kirim_soal', { tipe: 'otomatis' }); }
        
        function kirimSoalManual() {
            const val = document.getElementById('soalManual').value;
            if(!val) return;
            socket.emit('admin_kirim_soal', { tipe: 'manual', teks: val });
            document.getElementById('soalManual').value = "";
        }

        function balasSiswa(idSiswa) {
            const inputEl = document.getElementById(`in-${idSiswa}`);
            const msg = inputEl.value;
            if(!msg) return;
            socket.emit('guru_beri_izin', { targetId: idSiswa, pesan: msg });
            inputEl.value = "";
            alert("Balasan terkirim ke siswa!");
        }

        socket.on('notif_admin_khusus', (data) => {
            const log = document.getElementById('log-jawaban');
            const isEmergency = data.teks.includes("🚨");
            const div = document.createElement('div');
            div.className = 'item-log ' + (isEmergency ? 'item-panggilan' : '');
            div.innerHTML = `
                <div style="font-size:8px; color:#94a3b8;">M-${data.roomCode} | ${data.nama}</div>
                <div style="margin:4px 0;"><b>${data.teks}</b></div>
                <div style="display:flex; gap:4px;">
                    <input id="in-${data.socketId}" placeholder="Balas..." style="background:rgba(0,0,0,0.2); border:1px solid #444; color:#fff; padding:4px; font-size:10px; flex:1; border-radius:5px; outline:none;">
                    <button class="btn-main" style="padding:4px 8px; font-size:9px; border:none; color:white; border-radius:4px;" onclick="balasSiswa('${data.socketId}')">BALAS</button>
                </div>
            `;
            log.prepend(div);
        });

        socket.on('update_semua_meja', (rooms) => {
            const container = document.getElementById('container-meja');
            container.innerHTML = "";
            for (let code in rooms) {
                const card = document.createElement('div');
                card.className = 'kartu-meja';
                const adaJawab = rooms[code].some(s => s.isAnswering);
                card.innerHTML = `<div class="card-title" ${adaJawab ? 'style="color:var(--warning)"' : ''}>MEJA ${code}</div><div class="meja-lingkar-mini" id="m-${code}"></div>`;
                container.appendChild(card);
                
                const mini = document.getElementById(`m-${code}`);
                rooms[code].forEach((s, i) => {
                    const total = rooms[code].length;
                    const sud = (i / total) * 2 * Math.PI;
                    const x = Math.round(25 * Math.cos(sud)) + 26; 
                    const y = Math.round(25 * Math.sin(sud)) + 26;
                    const t = document.createElement('div');
                    t.className = 'titik-siswa' + (s.isAnswering ? ' sedang-jawab' : '');
                    t.style.left = x + 'px'; t.style.top = y + 'px';
                    t.innerText = s.nama.charAt(0).toUpperCase();
                    mini.appendChild(t);
                });
            }
        });
    </script>
</body>
</html>

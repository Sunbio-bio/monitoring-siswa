<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>MASTER CONTROL - SDN 62 TAJONG</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #6366f1; --bg-dark: #0f172a; --glass: rgba(255, 255, 255, 0.05); }
        body { font-family: 'Poppins', sans-serif; background: var(--bg-dark); color: white; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        aside { width: 280px; background: #1e293b; padding: 20px; border-right: 1px solid rgba(255,255,255,0.1); display: flex; flex-direction: column; }
        main { flex: 1; padding: 20px; display: flex; flex-direction: column; }
        .log-box { flex: 1; background: rgba(0,0,0,0.3); border-radius: 20px; padding: 15px; overflow-y: auto; border: 1px solid rgba(255,255,255,0.1); }
        .btn { padding: 12px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
        .item-log { background: var(--glass); padding: 10px; border-radius: 10px; margin-bottom: 8px; border-left: 4px solid var(--primary); font-size: 13px; }
        .footer { font-size: 10px; margin-top: auto; opacity: 0.6; }
    </style>
</head>
<body>

    <aside>
        <h2 style="color:var(--primary)">SDN 62 TAJONG</h2>
        <button class="btn" style="background:#f59e0b;" onclick="kirimSoal()">🎲 KIRIM SOAL ACAK</button>
        <button class="btn" style="background:#ef4444; color:white" onclick="paksaBuka()">🔓 BUKA PAKSA TOMBOL</button>
        <div style="background:rgba(0,0,0,0.2); padding:10px; border-radius:10px; font-size:12px; margin-top:10px;">
            Status: <b id="stat-t" style="color:#10b981">TERBUKA</b>
        </div>
        <div class="footer">
            Portal Sekolah Digital © 2026<br>Developed by Riski OPS 62 Tajong
        </div>
    </aside>

    <main>
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
            <h3 style="margin:0">LOG AKTIVITAS</h3>
            <button class="btn" style="background:#475569; color:white; font-size:11px; margin:0;" onclick="clearLog()">🗑️ CLEAR LOG</button>
        </div>
        
        <div class="log-box" id="monitor-log"></div>

        <div style="margin-top:15px; display:flex; gap:10px;">
            <input id="m-soal" style="flex:1; padding:12px; border-radius:10px; background:#1e293b; color:white; border:none;" placeholder="Ketik soal manual...">
            <button class="btn" style="background:var(--primary); color:white; margin:0;" onclick="manual()">KIRIM</button>
        </div>
    </main>

    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <script>
        const ably = new Ably.Realtime('Lqd-SA.02uOJw:5Q9fS13uwWhBLZJsqF9XA4gjNMzowZHCq2jJ9kxDdx8');
        const channel = ably.channels.get('sdn62-tajong-main');
        let isLocked = false;

        // LOAD LOG DARI STORAGE AGAR TIDAK HILANG SAAT REFRESH
        window.onload = () => {
            const savedLog = localStorage.getItem('sdn62_logs');
            if(savedLog) document.getElementById('monitor-log').innerHTML = savedLog;
        };

        channel.subscribe('request_lock', (msg) => {
            if(!isLocked) {
                isLocked = true;
                channel.publish('sistem_kendali', { tipe: 'LOCK', oleh: msg.data.nama });
                addLog(`🔒 <b>${msg.data.nama}</b> mengunci tombol.`);
                document.getElementById('stat-t').innerText = "TERKUNCI: " + msg.data.nama;
                document.getElementById('stat-t').style.color = "#ef4444";
                new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3').play();
            }
        });

        channel.subscribe('request_unlock', (msg) => {
            isLocked = false;
            channel.publish('sistem_kendali', { tipe: 'UNLOCK' });
            addLog(`🔓 Tombol Terbuka (${msg.data.alasan})`);
            document.getElementById('stat-t').innerText = "TERBUKA";
            document.getElementById('stat-t').style.color = "#10b981";
        });

        channel.subscribe('siswa_aksi', (msg) => {
            addLog(`👤 <b>${msg.data.nama}</b>: ${msg.data.aksi}`);
        });

        function paksaBuka() { channel.publish('request_unlock', { alasan: 'DIBUKA GURU' }); }
        
        function kirimSoal() {
            const s = ["Sebutkan sila ke-3!", "12 x 5?", "Ibu Kota RI?", "Penemu Lampu?", "3 Benda Padat?"];
            const soal = s[Math.floor(Math.random()*s.length)];
            channel.publish('pesan_guru', { teks: soal });
            addLog("📢 SOAL ACAK: " + soal);
        }

        function manual() {
            const t = document.getElementById('m-soal').value;
            if(!t) return;
            channel.publish('pesan_guru', { teks: t });
            addLog("✅ MANUAL: " + t);
            document.getElementById('m-soal').value = "";
        }

        function clearLog() {
            if(confirm("Hapus semua log?")) {
                document.getElementById('monitor-log').innerHTML = "";
                localStorage.removeItem('sdn62_logs');
            }
        }

        function addLog(h) {
            const div = document.createElement('div');
            div.className = 'item-log';
            div.innerHTML = `<small>${new Date().toLocaleTimeString()}</small> | ${h}`;
            const logBox = document.getElementById('monitor-log');
            logBox.prepend(div);
            // SIMPAN KE LOCALSTORAGE
            localStorage.setItem('sdn62_logs', logBox.innerHTML);
        }
    </script>
</body>
</html>

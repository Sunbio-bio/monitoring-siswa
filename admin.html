<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>MASTER CONTROL - SDN 62 TAJONG</title>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; margin: 0; display: flex; height: 100vh; }
        .side { width: 250px; background: #1e293b; padding: 20px; display: flex; flex-direction: column; }
        .main { flex: 1; padding: 20px; overflow-y: auto; }
        .card { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 12px; margin-bottom: 10px; border-left: 5px solid #6366f1; }
        .btn { padding: 10px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        input, select { padding: 10px; border-radius: 8px; border: none; background: #0f172a; color: white; width: 100%; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="side">
        <h3>SDN 62 TAJONG</h3>
        <p style="font-size:12px;">Monitoring Guru</p>
        <hr style="width:100%; opacity:0.1;">
        
        <button class="btn" style="background:#f59e0b; color:black;" onclick="soalAcak()">🎲 SOAL ACAK OTOMATIS</button>
        
        <div style="margin-top:20px;">
            <label style="font-size:10px;">BALAS KE SISWA:</label>
            <select id="pilih-siswa"><option value="SEMUA">SEMUA SISWA</option></select>
            <input id="input-balas" placeholder="Ketik balasan...">
            <button class="btn" style="background:#6366f1; color:white; width:100%;" onclick="balasSiswa()">KIRIM BALASAN</button>
        </div>
    </div>

    <div class="main">
        <h3>AKTIVITAS SISWA</h3>
        <div id="log-monitor"></div>
    </div>

    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <script>
        const ably = new Ably.Realtime('Lqd-SA.02uOJw:5Q9fS13uwWhBLZJsqF9XA4gjNMzowZHCq2jJ9kxDdx8');
        const channel = ably.channels.get('kelas-sdn62');
        const daftarSoal = ["Sebutkan sila ke-3 Pancasila!", "Berapakah hasil dari 12 x 5?", "Apa ibu kota provinsi Bengkulu?", "Sebutkan contoh hewan mamalia!", "Siapa penemu lampu pijar?"];

        function soalAcak() {
            const soal = daftarSoal[Math.floor(Math.random() * daftarSoal.length)];
            channel.publish('soal_broadcast', { teks: soal });
            addLog("📢 Mengirim Soal Acak: " + soal);
        }

        function balasSiswa() {
            const teks = document.getElementById('input-balas').value;
            const untuk = document.getElementById('pilih-siswa').value;
            if(!teks) return;
            channel.publish('balasan_guru', { teks, untuk });
            addLog(`✅ Membalas (${untuk}): ${teks}`);
            document.getElementById('input-balas').value = "";
        }

        channel.subscribe('siswa_join', (msg) => {
            addLog(`👤 <b>${msg.data.nama}</b> (Meja ${msg.data.meja}) Masuk.`);
            const sel = document.getElementById('pilih-siswa');
            const opt = document.createElement('option');
            opt.value = msg.data.nama; opt.text = msg.data.nama;
            sel.appendChild(opt);
        });

        channel.subscribe('siswa_aksi', (msg) => {
            let warna = "#6366f1";
            if(msg.data.aksi === 'BUTUH BANTUAN') warna = "#ef4444";
            if(msg.data.aksi === 'MENJAWAB') warna = "#10b981";
            
            addLog(`<span style="color:${warna}"><b>${msg.data.nama}</b>: ${msg.data.aksi} ${msg.data.teks || ''}</span>`);
            new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3').play();
        });

        function addLog(html) {
            const div = document.createElement('div');
            div.className = 'card';
            div.innerHTML = html;
            const log = document.getElementById('log-monitor');
            log.prepend(div);
        }
    </script>
</body>
</html>
